services:
  # Backend Web Service
  - type: web
    name: sniper-server
    env: node
    plan: free
    buildCommand: cd server && npm install && npx prisma generate && npm run build
    startCommand: cd server && npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: sniper-db
          property: connectionString
      - key: REDIS_URL
        sync: false # User to provide from Upstash (rediss://...)
      - key: FRONTEND_URL
        value: https://sniperthinkassignment.onrender.com
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production

  # Frontend Static Site
  - type: static
    name: sniper-client
    env: static
    plan: free
    buildCommand: cd client && npm install && npm run build
    staticPublishDir: client/dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: sniper-server
          property: host

  # Managed PostgreSQL Database
  - type: db
    name: sniper-db
    plan: free
