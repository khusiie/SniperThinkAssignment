services:
  # Backend Web Service
  - type: web
    name: sniper-server
    env: node
    plan: free
    buildCommand: cd server && npm install && npx prisma generate && npm run build
    startCommand: cd server && npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: sniper-db
          property: connectionString
      - key: REDIS_URL
        sync: false # User to provide from Upstash or similar
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production

  # Managed PostgreSQL Database
  - type: db
    name: sniper-db
    plan: free
